# Video-Gen-Pro 默认配置
# 作者：jixiang

video_gen_pro:
  # 输出路径 (F 盘物料产出目录)
  output_base_dir: "F:\\2025ideazdjx\\openClaw-project\\vedio"
  
  # 默认主角
  default_protagonist: null
  
  # 默认模板
  default_template: "standard_video_gen"
  
  # 输出质量
  output_quality: "high"  # standard/high/ultra
  
  # 视频宽高比
  aspect_ratio: "9:16"  # 16:9/9:16/1:1
  
  # 自动发布
  auto_publish: false
  
  # 水印配置
  watermark:
    enabled: true
    text: "Generated by Video-Gen-Pro"
  
  # 并行化配置
  parallelization:
    enabled: true
    max_concurrent_steps: 3
    max_concurrent_projects: 2
  
  # 资源限制
  resource_limits:
    max_memory_gb: 8
    max_disk_usage_gb: 50
    max_api_calls_per_minute: 10
  
  # 清理策略
  cleanup_policy:
    temp_files_ttl_hours: 24
    checkpoint_ttl_days: 7
    cache_ttl_days: 30
  
  # 配音配置
  voice:
    default_voice: "zh-CN-XiaoxiaoNeural"  # 晓晓 (女)
    # 可选声音:
    # - zh-CN-YunxiNeural (云希，男)
    # - zh-CN-YunyangNeural (云扬，男)
    # - zh-CN-XiaoyiNeural (晓伊，女)
    rate: "+0%"      # 语速
    pitch: "+0Hz"    # 音调
    volume: "+0%"    # 音量
  
  # 本地音乐库路径
  music_library:
    base_dir: "F:\\2025ideazdjx\\openClaw-project\\vedio\\music_library"
    categories:
      - "欢快"
      - "舒缓"
      - "专业"
      - "激情"
      - "浪漫"
